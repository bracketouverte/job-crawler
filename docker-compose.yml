services:
  job-parser:
    build:
      context: ./matcher
    working_dir: /app
    entrypoint: ["python", "/app/job_post_parser.py"]
    command: ["--help"]
    volumes:
      - ./matcher:/app
    restart: "no"

  eval:
    build:
      context: ./matcher
    working_dir: /app
    entrypoint: ["python", "/app/eval/eval.py"]
    environment:
      CAREER_OPS_DIR: ${CAREER_OPS_DIR:-career-ops}
    volumes:
      - ./matcher:/app
    restart: "no"

  matcher:
    build:
      context: ./matcher
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      CAREER_OPS_DIR: ${CAREER_OPS_DIR:-career-ops}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-4-maverick-17b-128e-instruct}
    volumes:
      - ./matcher:/app
    restart: "no"

  viewer:
    build:
      context: ./viewer
    env_file:
      - path: ./.env
        required: false
    ports:
      - "3000:3000"
    volumes:
      - ./viewer/public:/app/public:ro
      - ./crawler/state:/app/state
      - ./matcher:/matcher:ro
    environment:
      CATALOG_DB: /app/state/catalog.sqlite
      CAREER_OPS_DIR: ${CAREER_OPS_DIR:-career-ops}
      LOGO_DEV_PUBLISHABLE_KEY: ${LOGO_DEV_PUBLISHABLE_KEY:-}
      LOGO_DEV_SECRET_KEY: ${LOGO_DEV_SECRET_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SCORE_NOTIFY_MIN_SCORE: ${SCORE_NOTIFY_MIN_SCORE:-4}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-4-maverick-17b-128e-instruct}
    restart: unless-stopped

  scheduler:
    build:
      context: ./scheduler
    environment:
      - PROJECT_DIR=${PWD}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project:ro
      - ./crawler/state:/state
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
    volumes:
      - ./sources:/data/sources:ro
      - ./crawler/output:/app/output
      - ./crawler/state:/app/state
    command:
      - --concurrency
      - "8"
      - --provider-concurrency
      - ashby=1,workday=4,lever=3,teamtailor=2,bamboohr=3,greenhouse=6,workable=2
      - --timeout-ms
      - "30000"
      - --retries
      - "5"
      - --exclude-sources
      - /app/state/exclude.jsonl
      - --catalog-db
      - /app/state/catalog.sqlite
      - --catalog-file
      - /app/output/current-jobs.jsonl
