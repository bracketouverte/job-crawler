<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="feed.css" />
</head>
<body>
<div class="app" id="app-root">

  <!-- Header -->
  <header class="app-header">
    <div>
      <h1>Job feed</h1>
      <div class="sub" id="header-sub">Loading…</div>
    </div>
    <div class="meta" id="header-meta"></div>
  </header>

  <!-- Filters -->
  <section class="filters-panel">
    <div class="filters-top">
      <div class="filters-heading">
        <h2>Refine the job stream</h2>
        <div class="result-count" id="result-count"></div>
      </div>
      <div class="filters-stats" id="stats"></div>
    </div>
    <div class="filters-grid">
      <div class="filter-group">
        <label class="filter-label" for="filter-title">Job title</label>
        <input id="filter-title" class="filter-input" type="text" placeholder="product (owner,manager,builder)" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label class="filter-label" for="filter-location">Location</label>
        <input id="filter-location" class="filter-input" type="text" placeholder="Paris, Remote" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label class="filter-label" for="filter-company">Company</label>
        <input id="filter-company" class="filter-input" type="text" placeholder="Apple, Google" autocomplete="off" />
      </div>
      <div class="filter-group">
        <label class="filter-label">Providers</label>
        <div class="provider-dropdown" id="provider-dropdown">
          <button type="button" class="provider-btn" id="provider-btn">All providers</button>
          <div class="provider-menu" id="provider-menu"></div>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="filter-days">Max age</label>
        <input id="filter-days" class="filter-input" type="number" min="1" placeholder="7" />
      </div>
    </div>
  </section>

  <!-- Saved searches + favorites strip -->
  <div class="strip-panel">
    <div class="strip-left" id="saved-searches-strip">
      <span class="strip-label">Saved</span>
    </div>
    <div class="strip-right">
      <label class="fav-only-wrap">
        <input type="checkbox" id="fav-only-toggle" />
        Favorites only
      </label>
      <label class="fav-only-wrap">
        <input type="checkbox" id="evaluated-only-toggle" />
        Evaluated only
      </label>
      <button class="btn-manage" type="button" id="open-fav-modal">Manage favorites</button>
    </div>
  </div>

  <!-- Job list -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <div>Loading jobs…</div>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    <h3>No results</h3>
    <p id="empty-msg">No jobs match your filters.</p>
  </div>

  <div id="jobs-list" class="job-list" style="display:none"></div>

  <div id="pagination" class="pagination-wrap" style="display:none">
    <button id="btn-prev" class="btn" type="button">← Prev</button>
    <span id="page-info" class="page-info"></span>
    <button id="btn-next" class="btn" type="button">Next →</button>
  </div>

  <footer style="margin-top:24px; text-align:center; font-size:12px; color:var(--muted);">
    <a href="https://logo.dev" target="_blank" rel="noopener" style="color:inherit;">Logos by Logo.dev</a>
  </footer>
</div>

<!-- Side panel overlay -->
<div class="panel-overlay" id="panel-overlay"></div>
<div class="side-panel" id="side-panel" role="dialog" aria-modal="true" aria-label="Fit analysis">
  <header class="panel-header">
    <div>
      <div class="p-label">Fit analysis</div>
      <h2 id="panel-title"></h2>
      <div class="pcompany" id="panel-company"></div>
    </div>
    <button class="panel-close" id="panel-close">✕</button>
  </header>
  <div class="panel-body" id="panel-body"></div>
  <footer class="panel-footer" id="panel-footer"></footer>
</div>

<!-- Notification stack -->
<div id="notif-stack" class="notif-stack"></div>

<!-- JD data modal -->
<div class="modal-overlay" id="jd-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="jd-modal-title">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="jd-modal-title">Extracted JD data</h3>
      <button class="modal-close" id="jd-modal-close">✕</button>
    </div>
    <div class="modal-body" id="jd-modal-body" style="max-height:65vh;overflow-y:auto;">
      <div class="jd-loading">Loading…</div>
    </div>
  </div>
</div>

<!-- Favorites modal -->
<div class="modal-overlay" id="fav-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Favorite companies</h3>
      <button class="modal-close" id="close-fav-modal">✕</button>
    </div>
    <div class="modal-body">
      <div class="fav-add-row">
        <input id="fav-input" type="text" placeholder="Add favorite company" autocomplete="off" />
        <button class="btn" id="fav-add-btn" type="button">Add</button>
      </div>
      <div id="fav-chips-wrap" style="display:none">
        <div class="strip-label" style="margin-bottom:8px;">Saved companies</div>
        <div class="fav-chips" id="fav-chips"></div>
      </div>
    </div>
  </div>
</div>

<script src="feed.js"></script>
</body>
</html>
